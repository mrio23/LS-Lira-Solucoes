<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>LS - Lira Soluções</title>
</head>

<body class="bg-light pt-1">

<header class="bg-primary p-3 text-white shadow sticky-top rounded-4">
    <h2 class="text-center">LS - Lira Soluções.</h2>
</header>

<div class="container vh-100 d-flex align-items-center justify-content-center">
    
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 600px; width: 100%;">

        <div class="card-body p-3"></div>

        <h1 class="text-center fw-bold mb-3">Solicitar serviço</h1>

        <p class="text-center text-muted mb-4">
        Aqui na LS - Lira Soluções, oferecemos serviços de alta qualidade, realizados com profissionalismo, eficiência e compromisso com a satisfação dos nossos clientes.
        </p>

        <p class="text-center text-muted mb-4">Preencha os dados abaixo para solicitar um atendimento.</p>

        <form class="px-4" action="/servico" method="POST">

            <label class="form-label fw-semibold">Nome</label>
            <input class="form-control mb-3" name="nome" required>

            <label class="form-label fw-semibold">Endereço</label>
            <input class="form-control mb-3" name="endereco" required>

            <label class="form-label fw-semibold">Escolha o Serviço</label>
            <select class="form-select mb-3" name="servico" required>

                <option value="" selected disabled>-</option>
                <option value="reparo">Reparo</option>
                <option value="reforma">Reforma</option>
                <option value="hidráulica">Hidráulica</option>
                <option value="elétrica">Elétrica</option>
                <option value="pintura">Pintura</option>
                <option value="decoração">Decoração</option>
                <option value="manutenção">Manutenção</option>

            </select>

            <div class="mb-3">
                <label class="form-label fw-semibold" for="mensagem">Problema:</label>
                <textarea
                class="form-control mb-4"
                id="mensagem"
                name="mensagem"
                rows="4"
                placeholder="Descreva o problema"></textarea>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-lg btn-primary p-1 mb-3">
                Enviar
                </button>
            </div>

        </form>

    </div>

</div> 

<footer class="bg-dark text-white text-center p-1">
Todos os direitos reservados © 2026
</footer>

</body>
</html>
